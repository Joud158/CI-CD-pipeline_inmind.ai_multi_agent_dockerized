name: Docker CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}

jobs:
  # JOB 1: Test the Docker builds
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Test build RAG service
      run: |
        docker build -t test-rag ./rag_service
        echo "✅ RAG service builds successfully"
    
    - name: Test build Gateway service
      run: |
        docker build -t test-gateway ./gateway
        echo "✅ Gateway service builds successfully"
    
    - name: Verify Dockerfiles exist
      run: |
        ls -la ./rag_service/Dockerfile
        ls -la ./gateway/Dockerfile
        echo "✅ Dockerfiles found"
    
    - name: Check requirements files
      run: |
        cat ./rag_service/requirements.txt
        cat ./gateway/requirements.txt
        echo "✅ Requirements files found"

  # JOB 2: Build and push to Docker Hub (only on main branch)
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}
    
    - name: Build and push RAG service
      uses: docker/build-push-action@v4
      with:
        context: ./rag_service
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/rag-service:latest
          ${{ secrets.DOCKER_USERNAME }}/rag-service:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Build and push Gateway service
      uses: docker/build-push-action@v4
      with:
        context: ./gateway
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/gateway:latest
          ${{ secrets.DOCKER_USERNAME }}/gateway:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Verify images pushed
      run: |
        echo "✅ Images pushed to Docker Hub:"
        echo "  - ${{ secrets.DOCKER_USERNAME }}/rag-service:latest"
        echo "  - ${{ secrets.DOCKER_USERNAME }}/gateway:latest"
        echo "  - ${{ secrets.DOCKER_USERNAME }}/rag-service:${{ github.sha }}"
        echo "  - ${{ secrets.DOCKER_USERNAME }}/gateway:${{ github.sha }}"
  
  # JOB 3: Create production compose file (optional)
  create-production-config:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Create production compose file
      run: |
        cat > docker-compose.prod.yml << EOF
        version: '3.8'
        
        services:
          gateway:
            image: ${{ secrets.DOCKER_USERNAME }}/gateway:latest
            container_name: agent-gateway
            ports:
              - "8001:8000"
            environment:
              DB_HOST: db
              DB_PORT: 5432
              DB_NAME: agronomy
              DB_USER: agronomy
              DB_PASSWORD: \${DB_PASSWORD}
              RAG_URL: http://rag:8001
            depends_on:
              db:
                condition: service_healthy
              rag:
                condition: service_started
            networks:
              - public_net
              - private_net
            restart: always
        
          rag:
            image: ${{ secrets.DOCKER_USERNAME }}/rag-service:latest
            container_name: rag-service
            expose:
              - "8001"
            networks:
              - private_net
            restart: always
        
          db:
            image: postgres:16-alpine
            container_name: agronomy-db
            environment:
              POSTGRES_DB: agronomy
              POSTGRES_USER: agronomy
              POSTGRES_PASSWORD: \${DB_PASSWORD}
            expose:
              - "5432"
            volumes:
              - pgdata:/var/lib/postgresql/data
            healthcheck:
              test: ["CMD-SHELL", "pg_isready -U agronomy -d agronomy"]
              interval: 5s
              timeout: 5s
              retries: 10
            networks:
              - private_net
            restart: always
        
        networks:
          public_net:
            driver: bridge
          private_net:
            driver: bridge
            internal: true
        
        volumes:
          pgdata:
        EOF
        
        echo "✅ Created docker-compose.prod.yml"
    
    - name: Upload production compose file
      uses: actions/upload-artifact@v3
      with:
        name: docker-compose-prod
        path: docker-compose.prod.yml